<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --gray-light: #d8d5d0;

    font-family: 'Josefin Sans', sans-serif;
    padding: 20px;

  .card {
    width: 100%; max-width: 480px;

    border-radius: 4px; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    padding: 36px 30px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);

  .stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
  @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.8; } }

  .cloud { position: absolute; pointer-events: none; z-index: 1; animation: float 6s ease-in-out infinite alternate; }
  @keyframes float { from { transform: translateY(0px); } to { transform: translateY(-8px); } }
  .cloud svg { display: block; }
  .cloud-tl { top: -10px; left: -20px; width: 180px; animation-delay: 0s; }
  .cloud-tr { top: -10px; right: -20px; width: 160px; animation-delay: 1s; }
  .cloud-ml { top: 42%; left: -30px; width: 130px; animation-delay: 0.5s; }
  .cloud-mr { top: 38%; right: -30px; width: 150px; animation-delay: 1.5s; }
  .cloud-bl { bottom: 60px; left: -20px; width: 140px; animation-delay: 0.8s; }
  .cloud-br { bottom: 90px; right: -20px; width: 120px; animation-delay: 0.3s; }

  .content {
    position: relative; z-index: 2; width: 100%;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }

  .names {
    font-family: 'Dancing Script', cursive;
    color: var(--brown-dark);
    line-height: 1.0;
    margin-bottom: 10px;
    text-shadow: 1px 2px 6px rgba(61,43,31,0.15);
    display: flex; flex-direction: column; align-items: center;
  }
  .name-line { font-size: clamp(54px, 14vw, 78px); letter-spacing: -1px; display: block; }
  .ampersand {
    font-size: clamp(42px, 11vw, 62px);
    line-height: 0.75;
    color: var(--brown);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    opacity: 0.75;
    display: block;
  }
    to   { transform: translateY(-7px) rotate(2deg); }
  }

  .subtitle-small { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--brown); letter-spacing: 0.04em; margin-bottom: 5px; }
  .revelacion { font-family: 'Dancing Script', cursive; font-size: clamp(26px, 7vw, 36px); color: var(--brown-dark); margin-bottom: 4px; }
  .bebe { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; color: var(--brown); margin-bottom: 18px; }
  .divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--brown), transparent); margin: 0 auto 18px; opacity: 0.5; }
  .fecha { font-family: 'Dancing Script', cursive; font-size: clamp(22px, 6vw, 30px); color: var(--brown-dark); margin-bottom: 16px; line-height: 1.3; }
  .details { font-size: 11px; font-weight: 600; color: var(--brown); letter-spacing: 0.18em; text-transform: uppercase; line-height: 2; margin-bottom: 6px; }
  .vestimenta { font-size: 10.5px; font-weight: 600; color: var(--brown); letter-spacing: 0.14em; text-transform: uppercase; line-height: 1.7; margin-bottom: 20px; }

  .badge-row { display: flex; gap: 12px; margin-bottom: 22px; }
  .badge { padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  .badge-blue { background: var(--blue-soft); color: #2a4a5e; }
  .badge-pink { background: var(--pink-soft); color: #7a3a3a; }

  .btn-row { display: flex; gap: 14px; width: 100%; justify-content: center; margin-bottom: 20px; }
  .btn {
    flex: 1; max-width: 180px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 10px; border-radius: 50px;
    font-family: 'Josefin Sans', sans-serif; font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none;
    cursor: pointer; border: none;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.18); filter: brightness(1.04); }
  .btn:active { transform: scale(0.97); }
  .btn-whatsapp { background: #25D366; color: white; }
  .btn-maps { background: var(--brown-dark); color: var(--cream); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

</style>
